name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality, security and tests
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: src
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install system packages for Qt
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon-x11-0 libxcb-cursor0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -r requirements-dev.txt

      - name: Ruff format check
        run: ruff format --check .

      - name: Ruff lint
        run: ruff check .

      - name: Pyright
        run: pyright

      - name: Bandit
        run: bandit -c pyproject.toml -r src

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2

      - name: pip-audit
        run: |
          pip-audit --requirement requirements.txt --requirement requirements-dev.txt

      - name: Pytest with coverage
        run: pytest

      - name: Vulture informational
        continue-on-error: true
        run: vulture src tests --min-confidence 80

      - name: Radon informational
        continue-on-error: true
        run: |
          radon cc src -s -a
          radon mi src -s

      - name: PyInstaller build smoke test
        shell: bash
        run: |
          if [ -f airt.spec ]; then
            pyinstaller --noconfirm airt.spec
          elif [ -f scripts/build.ps1 ]; then
            echo "PowerShell build script exists; full Windows build is handled locally."
          else
            echo "No PyInstaller spec found; skipping build smoke test."
          fi
